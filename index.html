<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BP-Contact | BlocPlay</title>
    <style>
        /* --- DESIGN GLOBAL & DARK MODE --- */
        :root {
            --sidebar-bg: #2f3136;
            --chat-bg: #36393f;
            --header-bg: #36393f;
            --text-color: #dcddde;
            --accent-color: #5865f2; /* Bleu Blurple */
            --input-bg: #40444b;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Whitney', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--chat-bg);
            color: var(--text-color);
            display: flex;
        }

        /* --- BARRE LATÉRALE (CONTACTS) --- */
        .sidebar {
            width: 300px;
            background-color: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            border-right: 1px solid #202225;
        }

        .sidebar-header {
            padding: 20px;
            font-size: 18px;
            font-weight: bold;
            border-bottom: 1px solid #202225;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .contact-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 5px;
        }

        .contact-item:hover { background: #393c43; }
        .contact-item.active { background: #4f545c; color: white; }

        .avatar {
            width: 40px;
            height: 40px;
            background: var(--accent-color);
            border-radius: 50%;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }

        /* --- ZONE DE CHAT PRINCIPALE --- */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            height: 60px;
            background: var(--header-bg);
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid #202225;
            font-weight: bold;
            font-size: 16px;
        }

        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .msg-group {
            display: flex;
            gap: 15px;
        }

        .msg-content {
            display: flex;
            flex-direction: column;
        }

        .msg-author {
            font-weight: bold;
            color: white;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .msg-text {
            font-size: 15px;
            line-height: 1.3;
        }

        /* --- BARRE DE SAISIE --- */
        .input-area {
            padding: 20px;
            background: var(--chat-bg);
        }

        .input-wrapper {
            background: var(--input-bg);
            border-radius: 8px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
        }

        input {
            background: transparent;
            border: none;
            color: var(--text-color);
            flex: 1;
            font-size: 16px;
            outline: none;
        }

        .btn-bp {
            background: #f1c40f;
            color: black;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 10px;
        }

    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            BlocPlay 
            <button class="btn-bp" onclick="login()">Connexion</button>
        </div>
        <div class="contact-list" id="contactList">
            <div class="contact-item active" onclick="changeContact('Général', 'G')">
                <div class="avatar">G</div>
                <span>Flux Global</span>
            </div>
            <div class="contact-item" onclick="changeContact('Alex88', 'A')">
                <div class="avatar" style="background:#e67e22">A</div>
                <span>Alex88</span>
            </div>
            <div class="contact-item" onclick="changeContact('Zelda_Fan', 'Z')">
                <div class="avatar" style="background:#2ecc71">Z</div>
                <span>Zelda_Fan</span>
            </div>
        </div>
    </aside>

    <main class="main-chat">
        <header class="chat-header">
            <span id="currentContact"># Flux Global</span>
        </header>

        <div class="messages-container" id="chat">
            <div class="msg-group">
                <div class="avatar">BP</div>
                <div class="msg-content">
                    <span class="msg-author">Système BlocPlay</span>
                    <span class="msg-text">Bienvenue sur BP-Contact. Cliquez sur un contact à gauche pour démarrer une discussion privée.</span>
                </div>
            </div>
        </div>

        <footer class="input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Envoyer un message...">
            </div>
        </footer>
    </main>

    <script>
        const chat = document.getElementById('chat');
        const userInput = document.getElementById('userInput');
        const contactTitle = document.getElementById('currentContact');
        let currentUser = "Invité";

        function login() {
            const val = prompt("Pseudo BlocPlay :");
            if(val) currentUser = val;
        }

        function changeContact(name, initial) {
            // Change le titre
            contactTitle.innerText = `# ${name}`;
            
            // On vide le chat pour simuler le changement de salon
            chat.innerHTML = `<div class="msg-group">
                <div class="avatar">${initial}</div>
                <div class="msg-content">
                    <span class="msg-author">${name}</span>
                    <span class="msg-text">Début de votre historique avec ${name}.</span>
                </div>
            </div>`;

            // Style visuel
            document.querySelectorAll('.contact-item').forEach(item => {
                item.classList.remove('active');
                if(item.innerText.includes(name)) item.classList.add('active');
            });
        }

        function sendMessage() {
            const text = userInput.value;
            if (text.trim() !== "") {
                const html = `
                <div class="msg-group">
                    <div class="avatar" style="background:#5865f2">${currentUser[0].toUpperCase()}</div>
                    <div class="msg-content">
                        <span class="msg-author">${currentUser}</span>
                        <span class="msg-text">${text}</span>
                    </div>
                </div>`;
                chat.innerHTML += html;
                userInput.value = "";
                chat.scrollTop = chat.scrollHeight;
            }
        }

        userInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>

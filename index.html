<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BP-Contact | Synchronisé</title>
    <style>
        :root {
            --bg-contacts: #1e1f22;
            --bg-sidebar: #2b2d31;
            --bg-chat: #313338;
            --bg-input: #383a40;
            --text-main: #dbdee1;
            --text-muted: #949ba4;
            --accent: #5865f2;
            --online: #23a559;
            --danger: #ed4245;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg-contacts); color: var(--text-main); overflow: hidden; }

        .app-container { display: flex; height: 100vh; width: 100vw; }

        /* BARRE DE GAUCHE */
        .contacts-bar { width: 72px; background: var(--bg-contacts); display: flex; flex-direction: column; align-items: center; padding-top: 12px; gap: 12px; flex-shrink: 0; overflow-y: auto; }
        .contact-circle { 
            width: 48px; height: 48px; background: var(--bg-chat); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: 0.2s; font-weight: bold; color: white; position: relative; 
            text-decoration: none; font-size: 18px;
        }
        .contact-circle:hover, .contact-circle.active { border-radius: 30%; background: var(--accent); }
        .add-btn { color: var(--online); font-size: 24px; border: 2px dashed #35363c; }
        .add-btn:hover { border-style: solid; background: var(--online); color: white; }
        .separator { width: 32px; height: 2px; background: #35363c; }

        /* SIDEBAR */
        .sidebar-info { width: 240px; background: var(--bg-sidebar); display: flex; flex-direction: column; flex-shrink: 0; border-right: 1px solid #1e1f22; }
        .sidebar-header { height: 48px; padding: 0 16px; display: flex; align-items: center; font-weight: bold; border-bottom: 1px solid #1e1f22; }
        .info-content { padding: 15px; flex: 1; overflow-y: auto; }

        /* ZONE CHAT */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-chat); min-width: 0; }
        .chat-header { height: 48px; padding: 0 16px; display: flex; align-items: center; border-bottom: 1px solid #282a2e; font-weight: bold; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        
        .msg { display: flex; gap: 15px; margin-bottom: 5px; }
        .msg-user { font-weight: bold; color: white; font-size: 14px; }
        .msg-val { color: var(--text-main); font-size: 15px; margin-top: 2px; line-height: 1.4; }

        .input-box { padding: 0 16px 24px; }
        .input-wrap { background: var(--bg-input); border-radius: 8px; padding: 12px; }
        input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 15px; }

        /* MODAL */
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
        .card { background: var(--bg-sidebar); padding: 25px; border-radius: 8px; width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card input { width: 100%; padding: 10px; background: #1e1f22; border: none; border-radius: 4px; color: white; margin: 15px 0; outline: none; }
        .btn { width: 100%; padding: 10px; background: var(--accent); border: none; color: white; cursor: pointer; border-radius: 4px; font-weight: bold; }
        
        .hidden { display: none !important; }

        .request-item { background: #383a40; padding: 12px; border-radius: 4px; margin-bottom: 10px; font-size: 13px; }
        .req-btns { display: flex; gap: 8px; margin-top: 10px; }
        .btn-s { flex: 1; padding: 6px; border: none; border-radius: 3px; cursor: pointer; color: white; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loginOverlay" class="overlay">
        <div class="card">
            <h2>BlocPlay Contact</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Mot de passe">
            <button class="btn" id="loginBtn">Connexion</button>
        </div>
    </div>

    <div id="addModal" class="overlay hidden">
        <div class="card">
            <h3>Ajouter un ami</h3>
            <input type="email" id="friendEmail" placeholder="nom@exemple.com">
            <button class="btn" id="confirmAdd">Envoyer l'invitation</button>
            <button class="btn" style="background:#4e5058; margin-top:8px;" onclick="document.getElementById('addModal').classList.add('hidden')">Annuler</button>
        </div>
    </div>

    <div class="app-container">
        <nav class="contacts-bar">
            <div class="contact-circle active">BP</div>
            <div class="separator"></div>
            <div id="contactsIconsList" style="display:contents;"></div>
            <div class="contact-circle add-btn" onclick="document.getElementById('addModal').classList.remove('hidden')">+</div>
        </nav>

        <aside class="sidebar-info">
            <div class="sidebar-header">Demandes d'amis</div>
            <div class="info-content">
                <div id="requestsList" style="color:var(--text-muted); font-size:13px;">Aucune demande.</div>
                <hr style="border:0; border-top:1px solid #35363c; margin:20px 0;">
                <div id="activeInfo" style="font-size:13px; color:var(--text-muted);">Sélectionnez un contact.</div>
            </div>
            <div style="padding:10px; border-top:1px solid #232428;">
                <button id="logoutBtn" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:12px; width:100%; text-align:left;">Déconnexion</button>
            </div>
        </aside>

        <main class="chat-area">
            <header class="chat-header" id="chatTitle"># Message Privé</header>
            <div id="messages"></div>
            <div class="input-box">
                <div class="input-wrap">
                    <input type="text" id="userInput" placeholder="Ecrire..." disabled>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, get, query, orderByChild, equalTo, remove, off, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQHLAG_Dvnc-a8LDJ__05oRwMmEtUkn04",
            authDomain: "blocplay-a9417.firebaseapp.com",
            databaseURL: "https://blocplay-a9417-default-rtdb.firebaseio.com",
            projectId: "blocplay-a9417",
            storageBucket: "blocplay-a9417.firebasestorage.app",
            messagingSenderId: "540161549188",
            appId: "1:540161549188:web:ffe799fa3747cb42f333d1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let currentUser = null;
        let activeChatId = null;

        // --- AUTH ---
        document.getElementById('loginBtn').onclick = () => {
            const e = document.getElementById('email').value.trim();
            const p = document.getElementById('pass').value.trim();
            signInWithEmailAndPassword(auth, e, p).catch(err => alert("Erreur : " + err.message));
        };

        document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginOverlay').classList.add('hidden');
                
                // --- SYNCHRONISATION CRUCIALE ---
                // Si l'utilisateur a changé son mail sur l'autre site, 
                // on met à jour la base de données ici dès qu'il se connecte.
                const userRef = ref(db, 'users/' + user.uid);
                const snap = await get(userRef);
                const existingData = snap.exists() ? snap.val() : {};

                await update(userRef, {
                    uid: user.uid,
                    email: user.email.toLowerCase(), // On synchronise l'email actuel de Firebase Auth
                    name: existingData.name || user.email.split('@')[0] // On garde le pseudo existant
                });

                loadContacts();
                loadRequests();
            } else {
                document.getElementById('loginOverlay').classList.remove('hidden');
            }
        });

        // --- ENVOYER INVITATION ---
        document.getElementById('confirmAdd').onclick = async () => {
            const email = document.getElementById('friendEmail').value.trim().toLowerCase();
            if (!email || email === currentUser.email.toLowerCase()) return alert("Email invalide");

            const q = query(ref(db, 'users'), orderByChild('email'), equalTo(email));
            const snap = await get(q);

            if (snap.exists()) {
                const target = Object.values(snap.val())[0];
                const mySnap = await get(ref(db, 'users/' + currentUser.uid));
                const myName = mySnap.exists() ? mySnap.val().name : currentUser.email.split('@')[0];

                await set(ref(db, `requests/${target.uid}/${currentUser.uid}`), {
                    fromUid: currentUser.uid,
                    fromName: myName,
                    fromEmail: currentUser.email
                });
                
                alert("Invitation envoyée !");
                document.getElementById('addModal').classList.add('hidden');
            } else { alert("Utilisateur introuvable"); }
        };

        // --- DEMANDES ---
        function loadRequests() {
            onValue(ref(db, `requests/${currentUser.uid}`), (snap) => {
                const list = document.getElementById('requestsList');
                list.innerHTML = snap.exists() ? "" : "Aucune demande.";
                snap.forEach(child => {
                    const r = child.val();
                    const d = document.createElement('div');
                    d.className = "request-item";
                    d.innerHTML = `<b>${r.fromName}</b> vous a invité.
                        <div class="req-btns">
                            <button class="btn-s" style="background:var(--online)" id="acc-${r.fromUid}">ACCEPTER</button>
                            <button class="btn-s" style="background:var(--danger)" id="ref-${r.fromUid}">REFUSER</button>
                        </div>`;
                    list.appendChild(d);
                    document.getElementById(`acc-${r.fromUid}`).onclick = () => acceptFriend(r);
                    document.getElementById(`ref-${r.fromUid}`).onclick = () => remove(ref(db, `requests/${currentUser.uid}/${r.fromUid}`));
                });
            });
        }

        async function acceptFriend(r) {
            const mySnap = await get(ref(db, 'users/' + currentUser.uid));
            const myData = mySnap.val();
            const targetSnap = await get(ref(db, 'users/' + r.fromUid));
            const targetData = targetSnap.val();

            await set(ref(db, `contacts/${currentUser.uid}/${r.fromUid}`), { uid: targetData.uid, name: targetData.name, email: targetData.email });
            await set(ref(db, `contacts/${r.fromUid}/${currentUser.uid}`), { uid: myData.uid, name: myData.name, email: myData.email });
            await remove(ref(db, `requests/${currentUser.uid}/${r.fromUid}`));
        }

        // --- CONTACTS ---
        function loadContacts() {
            onValue(ref(db, `contacts/${currentUser.uid}`), (snap) => {
                const list = document.getElementById('contactsIconsList');
                list.innerHTML = "";
                snap.forEach(child => {
                    const f = child.val();
                    onValue(ref(db, `users/${f.uid}/name`), (nameSnap) => {
                        const realName = nameSnap.val() || f.name;
                        let icon = document.getElementById('icon-' + f.uid);
                        if(!icon) {
                            icon = document.createElement('div');
                            icon.id = 'icon-' + f.uid;
                            icon.className = "contact-circle";
                            icon.onclick = () => openChat(f);
                            list.appendChild(icon);
                        }
                        icon.innerText = realName[0].toUpperCase();
                        icon.title = realName;
                    });
                });
            });
        }

        // --- CHAT ---
        function openChat(friend) {
            if(activeChatId) off(ref(db, 'chats/' + activeChatId));
            const ids = [currentUser.uid, friend.uid].sort();
            activeChatId = ids[0] + "_" + ids[1];
            
            onValue(ref(db, `users/${friend.uid}/name`), (nSnap) => {
                const name = nSnap.val() || friend.name;
                document.getElementById('chatTitle').innerText = "@ " + name;
                document.getElementById('activeInfo').innerHTML = `<b>Ami :</b> ${name}`;
            });

            document.getElementById('userInput').disabled = false;
            const mDiv = document.getElementById('messages');
            
            onValue(ref(db, 'chats/' + activeChatId), (snap) => {
                mDiv.innerHTML = "";
                snap.forEach(m => {
                    const v = m.val();
                    mDiv.innerHTML += `<div class="msg"><div><span class="msg-user">${v.author}</span><div class="msg-val">${v.text}</div></div></div>`;
                });
                mDiv.scrollTop = mDiv.scrollHeight;
            });
        }

        document.getElementById('userInput').onkeydown = async (e) => {
            if(e.key === "Enter" && e.target.value.trim() && activeChatId) {
                const mySnap = await get(ref(db, 'users/' + currentUser.uid));
                const myName = mySnap.exists() ? mySnap.val().name : currentUser.email.split('@')[0];
                
                push(ref(db, 'chats/' + activeChatId), { author: myName, text: e.target.value });
                e.target.value = "";
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BP-Contact | Fix IDs Personnalisés</title>
    <style>
        :root {
            --bg-main: #1e1f22;
            --bg-sidebar: #2b2d31;
            --bg-chat: #313338;
            --accent: #5865f2;
            --msg-me: #5865f2;
            --msg-friend: #383a40;
            --text-main: #dbdee1;
            --text-muted: #949ba4;
            --online: #23a559;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg-main); color: var(--text-main); overflow: hidden; }
        .app-container { display: flex; height: 100vh; width: 100vw; position: relative; }

        /* SIDEBARS */
        .side-panels { display: flex; height: 100%; transition: transform 0.3s ease; z-index: 1000; }
        .contacts-bar { width: 72px; background: var(--bg-main); display: flex; flex-direction: column; align-items: center; padding-top: 15px; gap: 12px; flex-shrink: 0; }
        .bp-logo { width: 48px; height: 48px; background: var(--accent); border-radius: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; color: white; }
        .contact-circle { width: 48px; height: 48px; background: var(--bg-sidebar); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; font-weight: bold; font-size: 18px; }
        .add-btn { color: var(--online); border: 2px dashed #35363c; font-size: 24px; }

        .sidebar-info { width: 240px; background: var(--bg-sidebar); display: flex; flex-direction: column; border-right: 1px solid #1e1f22; }
        .sidebar-header { height: 50px; padding: 0 16px; display: flex; align-items: center; font-weight: bold; border-bottom: 1px solid #1e1f22; justify-content: space-between; }

        /* CHAT AREA */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-chat); min-width: 0; }
        .chat-header { height: 50px; padding: 0 15px; display: flex; align-items: center; border-bottom: 1px solid #26272d; font-weight: bold; }
        #mobileMenuBtn { display: none; width: 35px; height: 35px; background: var(--accent); border: none; color: white; border-radius: 8px; font-weight: bold; margin-right: 12px; }

        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }

        /* BULLLES */
        .msg-wrapper { display: flex; flex-direction: column; max-width: 80%; }
        .msg-me { align-self: flex-end; align-items: flex-end; }
        .msg-friend { align-self: flex-start; align-items: flex-start; }
        .msg-author { font-size: 11px; font-weight: bold; margin-bottom: 2px; color: var(--text-muted); }
        .bubble { padding: 10px 16px; border-radius: 18px; font-size: 15px; word-wrap: break-word; }
        .msg-me .bubble { background: var(--msg-me); color: white; border-bottom-right-radius: 4px; }
        .msg-friend .bubble { background: var(--msg-friend); color: var(--text-main); border-bottom-left-radius: 4px; }

        .input-box { padding: 10px 20px 30px; background: var(--bg-chat); }
        .input-wrap { background: #383a40; border-radius: 12px; padding: 12px; }
        #userInput { background: transparent; border: none; color: white; width: 100%; outline: none; }

        @media (max-width: 768px) {
            #mobileMenuBtn { display: block; }
            .side-panels { position: absolute; transform: translateX(-100%); width: 312px; }
            .side-panels.open { transform: translateX(0); }
        }

        /* MODALES */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .card { background: var(--bg-sidebar); padding: 25px; border-radius: 15px; width: 90%; max-width: 320px; text-align: center; }
        .card input { width: 100%; padding: 12px; background: #1e1f22; border: 1px solid #444; border-radius: 8px; color: white; margin: 10px 0; outline: none; }
        .btn { width: 100%; padding: 12px; background: var(--accent); border: none; color: white; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loginOverlay" class="overlay">
        <div class="card">
            <h2>BlocPlay</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Mot de passe">
            <button class="btn" id="loginBtn">Connexion</button>
        </div>
    </div>

    <div id="addModal" class="overlay hidden">
        <div class="card">
            <h3>Ajouter un ami</h3>
            <input type="email" id="friendEmail" placeholder="email@exemple.com">
            <button class="btn" id="sendInviteBtn">Envoyer l'invitation</button>
            <button class="btn" style="background:#4e5058; margin-top:10px;" onclick="document.getElementById('addModal').classList.add('hidden')">Fermer</button>
        </div>
    </div>

    <div class="app-container">
        <div class="side-panels" id="sidePanels">
            <nav class="contacts-bar">
                <div class="bp-logo" id="bpMenuClose">BP</div>
                <div id="contactsIconsList" style="display:contents;"></div>
                <div class="contact-circle add-btn" onclick="document.getElementById('addModal').classList.remove('hidden')">+</div>
            </nav>
            <aside class="sidebar-info">
                <div class="sidebar-header">Messages Privés</div>
                <div id="requestsList" style="padding:15px; border-bottom: 1px solid #1e1f22; max-height: 200px; overflow-y: auto;"></div>
                <div id="contactsListNames" style="padding:15px; flex:1; overflow-y:auto;"></div>
                <button id="logoutBtn" style="padding:15px; background:none; border:none; color:#ed4245; cursor:pointer; font-weight:bold; text-align:left;">DÉCONNEXION</button>
            </aside>
        </div>

        <main class="chat-area">
            <header class="chat-header">
                <button id="mobileMenuBtn">BP</button>
                <span id="chatTitle">Sélectionnez un ami</span>
            </header>
            <div id="messages"></div>
            <div class="input-box">
                <div class="input-wrap">
                    <input type="text" id="userInput" placeholder="Ecrire..." disabled>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, get, query, orderByChild, equalTo, remove, off } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQHLAG_Dvnc-a8LDJ__05oRwMmEtUkn04",
            authDomain: "blocplay-a9417.firebaseapp.com",
            databaseURL: "https://blocplay-a9417-default-rtdb.firebaseio.com",
            projectId: "blocplay-a9417",
            storageBucket: "blocplay-a9417.firebasestorage.app",
            messagingSenderId: "540161549188",
            appId: "1:540161549188:web:ffe799fa3747cb42f333d1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let currentUser = null;
        let myCustomId = null; // <-- La clé magique pour faire le lien
        let activeChatId = null;

        const side = document.getElementById('sidePanels');
        document.getElementById('mobileMenuBtn').onclick = () => side.classList.add('open');
        document.getElementById('bpMenuClose').onclick = () => side.classList.remove('open');

        // --- AUTH & RECUPERATION DU CUSTOM ID ---
        document.getElementById('loginBtn').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('email').value.trim(), document.getElementById('pass').value)
                .catch(err => alert("Erreur connexion: " + err.message));
        };
        
        document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                
                // On va chercher TON ID personnalisé dans la base via ton email
                const q = query(ref(db, 'users'), orderByChild('email'), equalTo(user.email.toLowerCase()));
                const snap = await get(q);
                
                if (snap.exists()) {
                    myCustomId = Object.keys(snap.val())[0]; // On récupère ton ID fait main
                } else {
                    myCustomId = user.uid; // Sécurité si jamais on ne le trouve pas
                }

                document.getElementById('loginOverlay').classList.add('hidden');
                loadRequests();
                loadContacts();
            } else {
                document.getElementById('loginOverlay').classList.remove('hidden');
            }
        });

        // --- ENVOYER INVITATION ---
        document.getElementById('sendInviteBtn').onclick = async () => {
            const emailInput = document.getElementById('friendEmail').value.trim().toLowerCase();
            if (!emailInput || emailInput === currentUser.email.toLowerCase()) return alert("Email invalide");

            try {
                // 1. Chercher l'ID de l'ami
                const q = query(ref(db, 'users'), orderByChild('email'), equalTo(emailInput));
                const snap = await get(q);

                if (snap.exists()) {
                    const targetCustomId = Object.keys(snap.val())[0]; 
                    
                    // 2. Récupérer MON pseudo
                    const mySnap = await get(ref(db, `users/${myCustomId}/displayName`));
                    const myName = mySnap.val() || currentUser.email.split('@')[0];

                    // 3. Ecrire la demande (Avec les CUSTOM IDs)
                    await set(ref(db, `requests/${targetCustomId}/${myCustomId}`), {
                        fromUid: myCustomId,
                        fromName: myName,
                        at: Date.now()
                    });

                    alert("Invitation envoyée !");
                    document.getElementById('addModal').classList.add('hidden');
                    document.getElementById('friendEmail').value = "";
                } else {
                    alert("Utilisateur non trouvé avec cet email.");
                }
            } catch (err) { alert(err.message); }
        };

        // --- CHARGER LES DEMANDES ---
        function loadRequests() {
            // On écoute le dossier de TON ID personnalisé
            onValue(ref(db, `requests/${myCustomId}`), (snap) => {
                const list = document.getElementById('requestsList');
                list.innerHTML = "";
                
                if (snap.exists()) {
                    const header = document.createElement('div');
                    header.style = "font-size:11px; color:var(--online); font-weight:bold; margin-bottom:10px;";
                    header.innerText = "DEMANDES REÇUES";
                    list.appendChild(header);

                    snap.forEach(child => {
                        const r = child.val();
                        const senderCustomId = child.key;

                        const item = document.createElement('div');
                        item.style = "background:#383a40; padding:10px; border-radius:8px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; font-size:13px;";
                        item.innerHTML = `<span>${r.fromName}</span> <button style="background:var(--online); border:none; color:white; padding:4px 8px; border-radius:4px; cursor:pointer;">OK</button>`;
                        
                        item.querySelector('button').onclick = () => acceptFriend(senderCustomId);
                        list.appendChild(item);
                    });
                }
            });
        }

        async function acceptFriend(senderCustomId) {
            try {
                // Ajout mutuel avec les Custom IDs
                await set(ref(db, `contacts/${myCustomId}/${senderCustomId}`), { uid: senderCustomId });
                await set(ref(db, `contacts/${senderCustomId}/${myCustomId}`), { uid: myCustomId });
                
                // Suppression de la demande
                await remove(ref(db, `requests/${myCustomId}/${senderCustomId}`));
                alert("Ami ajouté !");
            } catch (err) { alert(err.message); }
        }

        // --- CONTACTS ---
        function loadContacts() {
            onValue(ref(db, `contacts/${myCustomId}`), (snap) => {
                const iconList = document.getElementById('contactsIconsList');
                const nameList = document.getElementById('contactsListNames');
                iconList.innerHTML = "";
                nameList.innerHTML = "";
                
                snap.forEach(c => {
                    const fid = String(c.val().uid);
                    onValue(ref(db, `users/${fid}`), (uSnap) => {
                        if(!uSnap.exists()) return;
                        const u = uSnap.val();
                        const name = u.displayName || u.email.split('@')[0];
                        
                        const icon = document.createElement('div');
                        icon.className = "contact-circle";
                        icon.innerText = name[0].toUpperCase();
                        icon.onclick = () => { openChat(fid, name); side.classList.remove('open'); };
                        iconList.appendChild(icon);

                        const nDiv = document.createElement('div');
                        nDiv.style = "padding:10px; cursor:pointer; border-radius:8px; font-size:14px; margin-bottom:5px; background:#2b2d31;";
                        nDiv.innerText = name;
                        nDiv.onclick = () => { openChat(fid, name); side.classList.remove('open'); };
                        nameList.appendChild(nDiv);
                    });
                });
            });
        }

        // --- CHAT ---
        function openChat(friendCustomId, friendName) {
            if(activeChatId) off(ref(db, 'chats/' + activeChatId));
            const ids = [myCustomId, friendCustomId].sort();
            activeChatId = ids[0] + "_" + ids[1];
            
            document.getElementById('chatTitle').innerText = friendName;
            document.getElementById('userInput').disabled = false;
            
            const mDiv = document.getElementById('messages');
            onValue(ref(db, 'chats/' + activeChatId), (snap) => {
                mDiv.innerHTML = "";
                snap.forEach(m => {
                    const v = m.val();
                    const isMe = String(v.authorUid) === String(myCustomId);
                    const wrap = document.createElement('div');
                    wrap.className = `msg-wrapper ${isMe ? 'msg-me' : 'msg-friend'}`;
                    wrap.innerHTML = `<div class="msg-author">${isMe ? 'Moi' : friendName}</div><div class="bubble">${v.text}</div>`;
                    mDiv.appendChild(wrap);
                });
                mDiv.scrollTop = mDiv.scrollHeight;
            });
        }

        document.getElementById('userInput').onkeydown = (e) => {
            if(e.key === "Enter" && e.target.value.trim() && activeChatId) {
                push(ref(db, 'chats/' + activeChatId), {
                    authorUid: myCustomId,
                    text: e.target.value,
                    ts: Date.now()
                });
                e.target.value = "";
            }
        };
    </script>
</body>
</html>

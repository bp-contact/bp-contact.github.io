<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BP-Contact | Pro</title>
    <style>
        :root {
            --bg-main: #1e1f22;
            --bg-sidebar: #2b2d31;
            --bg-chat: #313338;
            --accent: #5865f2;
            --msg-me: #5865f2;
            --msg-friend: #383a40;
            --text-main: #dbdee1;
            --text-muted: #949ba4;
            --online: #23a559;
            --danger: #ed4245;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg-main); color: var(--text-main); overflow: hidden; position: fixed; }
        .app-container { display: flex; height: 100vh; width: 100vw; }

        /* Sidebar & Navigation */
        .side-panels { display: flex; height: 100%; transition: transform 0.3s ease; z-index: 1000; flex-shrink: 0; }
        .contacts-bar { width: 72px; background: var(--bg-main); display: flex; flex-direction: column; align-items: center; padding-top: 15px; gap: 12px; }
        .bp-logo { width: 48px; height: 48px; background: var(--accent); border-radius: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; color: white; }
        .contact-circle { width: 48px; height: 48px; background: var(--bg-sidebar); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; text-transform: uppercase; border: 2px solid transparent; }
        .sidebar-info { width: 240px; background: var(--bg-sidebar); display: flex; flex-direction: column; border-right: 1px solid #1e1f22; }

        /* Contenu Principal */
        .main-content { flex: 1; position: relative; height: 100%; background: var(--bg-chat); display: flex; flex-direction: column; min-width: 0; }

        /* Style des Cartes (Accueil & Voir Plus) */
        .scroll-page { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .contact-card { 
            background: white; border-radius: 20px; padding: 15px 20px; color: #333; 
            display: flex; align-items: center; gap: 15px; margin-top: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .user-icon-wrap { width: 50px; height: 50px; background: #444; border-radius: 50%; position: relative; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; flex-shrink: 0; }
        .status-dot { position: absolute; bottom: 0; right: 0; width: 14px; height: 14px; border-radius: 50%; border: 2px solid white; }
        .status-dot.online { background: var(--online); }
        .status-dot.offline { background: #808080; }
        .user-name-big { font-size: 22px; color: #1e1f22; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Chat & Messages */
        #chatPage { display: none; flex-direction: column; height: 100%; position: relative; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { 
            padding: 12px 16px; border-radius: 18px; font-size: 15px; 
            overflow-wrap: break-word; word-wrap: break-word; word-break: break-word; 
            max-width: 100%; line-height: 1.4;
        }

        /* Barre de chat FIXE en bas */
        .chat-input-area { 
            padding: 15px; 
            background: var(--bg-chat); 
            border-top: 1px solid #26272d;
            margin-bottom: env(safe-area-inset-bottom);
        }
        .input-wrap { background: #383a40; border-radius: 12px; padding: 8px 15px; display: flex; align-items: center; gap: 10px; }
        #userInput { background: transparent; border: none; color: white; flex: 1; outline: none; font-size: 16px; height: 35px; }

        /* Overlays */
        #seeMoreOverlay { position: absolute; inset: 0; background: var(--bg-chat); z-index: 100; display: none; flex-direction: column; padding: 20px; }
        .overlay-full { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .auth-card { background: var(--bg-sidebar); padding: 25px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; }

        .hamburger { background: none; border: none; color: white; font-size: 28px; cursor: pointer; margin-right: 15px; }
        @media (max-width: 768px) {
            .side-panels { position: absolute; transform: translateX(-100%); width: 300px; height: 100%; }
            .side-panels.open { transform: translateX(0); }
        }
    </style>
</head>
<body onclick="hideMenu()">
    <div id="contextMenu" style="position: fixed; background: #111214; border-radius: 8px; padding: 8px; z-index: 6000; display: none; width: 160px;">
        <div class="menu-item" onclick="editMsg()" style="padding:10px; color:white; cursor:pointer;">Modifier</div>
        <div class="menu-item" onclick="deleteMsg()" style="padding:10px; color:var(--danger); cursor:pointer;">Supprimer</div>
    </div>

    <div id="loginOverlay" class="overlay-full">
        <div class="auth-card">
            <h2>BlocPlay</h2>
            <input type="email" id="email" placeholder="Email" style="width:100%; padding:12px; margin:10px 0; border-radius:8px; border:none; background:#1e1f22; color:white;">
            <input type="password" id="pass" placeholder="Mot de passe" style="width:100%; padding:12px; margin-bottom:20px; border-radius:8px; border:none; background:#1e1f22; color:white;">
            <button id="loginBtn" style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:8px; font-weight:bold;">CONNEXION</button>
        </div>
    </div>

    <div class="app-container">
        <div class="side-panels" id="sidePanels">
            <nav class="contacts-bar">
                <div class="bp-logo" onclick="showHome()">BP</div>
                <div id="contactsIconsList" style="display:contents;"></div>
                <div class="contact-circle" style="color:var(--online); border:2px dashed #35363c;" onclick="document.getElementById('addModal').classList.remove('hidden')">+</div>
            </nav>
            <aside class="sidebar-info">
                <div style="padding:20px; font-weight:bold; border-bottom:1px solid #1e1f22;">DEMANDES</div>
                <div id="requestsList" style="padding:10px; overflow-y:auto; flex:1;"></div>
                <button onclick="auth.signOut().then(()=>location.reload())" style="padding:20px; color:var(--danger); background:none; border:none; text-align:left; cursor:pointer;">DÉCONNEXION</button>
            </aside>
        </div>

        <div class="main-content">
            <div id="homePage" class="scroll-page">
                <div style="display:flex; align-items:center; font-size:24px; color:white; font-weight:bold;">
                    <button class="hamburger" onclick="toggleMenu()">☰</button> Contacts
                </div>
                <section>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span id="onLabel" style="font-size:18px;">En ligne (0) :</span>
                        <span class="view-more" onclick="openSeeMore('online')">Voir plus ></span>
                    </div>
                    <div id="onPreview"></div>
                </section>
                <section>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span id="offLabel" style="font-size:18px;">Hors ligne (0) :</span>
                        <span class="view-more" onclick="openSeeMore('offline')">Voir plus ></span>
                    </div>
                    <div id="offPreview"></div>
                </section>
            </div>

            <div id="chatPage">
                <header style="height:60px; padding:0 15px; display:flex; align-items:center; border-bottom:1px solid #26272d;">
                    <button class="hamburger" onclick="toggleMenu()">☰</button>
                    <span id="chatTitle" style="font-weight:bold;">Pseudo</span>
                </header>
                <div id="messages"></div>
                <div class="chat-input-area">
                    <div class="input-wrap">
                        <input type="text" id="userInput" placeholder="Écrire un message...">
                        <button id="sendBtn" style="background:var(--accent); color:white; border:none; border-radius:50%; width:35px; height:35px; cursor:pointer;">➤</button>
                    </div>
                </div>
            </div>

            <div id="seeMoreOverlay">
                <div style="display:flex; align-items:center; margin-bottom:20px;">
                    <button class="hamburger" onclick="toggleMenu()">☰</button>
                    <span id="seeMoreTitle" style="font-size:22px; font-weight:bold;">Liste</span>
                    <button onclick="closeSeeMore()" style="margin-left:auto; background:none; border:none; color:var(--accent); font-weight:bold;">Fermer</button>
                </div>
                <div id="seeMoreGrid" style="display:flex; flex-direction:column; gap:12px;"></div>
            </div>
        </div>
    </div>
<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, get, query, orderByChild, equalTo, remove, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQHLAG_Dvnc-a8LDJ__05oRwMmEtUkn04",
            authDomain: "blocplay-a9417.firebaseapp.com",
            databaseURL: "https://blocplay-a9417-default-rtdb.firebaseio.com",
            projectId: "blocplay-a9417",
            storageBucket: "blocplay-a9417.firebasestorage.app",
            messagingSenderId: "540161549188",
            appId: "1:540161549188:web:ffe799fa3747cb42f333d1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        let myId = null, activeChatId = null, contactsList = [];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                myId = user.uid;
                const uRef = ref(db, `users/${myId}`);
                await update(uRef, { uid: myId, email: user.email.toLowerCase(), displayName: user.email.split('@')[0], status: "online" });
                onDisconnect(uRef).update({ status: "offline" });
                document.getElementById('loginOverlay').classList.add('hidden');
                loadContacts(); loadRequests();
            } else { document.getElementById('loginOverlay').classList.remove('hidden'); }
        });

        window.toggleMenu = () => document.getElementById('sidePanels').classList.toggle('open');
        window.showHome = () => {
            document.getElementById('homePage').style.display = 'flex';
            document.getElementById('chatPage').style.display = 'none';
            document.getElementById('seeMoreOverlay').style.display = 'none';
            activeChatId = null;
        };

        function loadContacts() {
            onValue(ref(db, `contacts/${myId}`), (snap) => {
                const iconList = document.getElementById('contactsIconsList'); iconList.innerHTML = "";
                contactsList = [];
                snap.forEach(c => {
                    const fid = c.val().uid;
                    onValue(ref(db, `users/${fid}`), (uSnap) => {
                        const data = uSnap.val(); if(!data) return;
                        contactsList = contactsList.filter(u => u.uid !== fid); contactsList.push(data);
                        
                        // Icon Sidebar
                        const icon = document.createElement('div');
                        icon.className = "contact-circle"; icon.innerText = data.displayName[0];
                        icon.onclick = () => openChat(fid, data.displayName);
                        iconList.appendChild(icon);

                        updateDashboard();
                    });
                });
            });
        }

        function updateDashboard() {
            const onArr = contactsList.filter(u => u.status === 'online');
            const offArr = contactsList.filter(u => u.status === 'offline');
            document.getElementById('onLabel').innerText = `En ligne (${onArr.length}) :`;
            document.getElementById('offLabel').innerText = `Hors ligne (${offArr.length}) :`;

            const card = (u) => `<div class="contact-card" onclick="openChat('${u.uid}', '${u.displayName}')"><div class="user-icon-wrap">${u.displayName[0]}<div class="status-dot ${u.status}"></div></div><div class="user-name-big">${u.displayName}</div></div>`;
            document.getElementById('onPreview').innerHTML = onArr.length ? card(onArr[0]) : "";
            document.getElementById('offPreview').innerHTML = offArr.length ? card(offArr[0]) : "";
        }

        window.openSeeMore = (type) => {
            const grid = document.getElementById('seeMoreGrid'); grid.innerHTML = "";
            document.getElementById('seeMoreOverlay').style.display = 'flex';
            document.getElementById('seeMoreTitle').innerText = type === 'online' ? "En ligne" : "Hors ligne";
            contactsList.filter(c => c.status === type).forEach(c => {
                grid.innerHTML += `<div class="contact-card" onclick="openChat('${c.uid}', '${c.displayName}')"><div class="user-icon-wrap">${c.displayName[0]}<div class="status-dot ${c.status}"></div></div><div class="user-name-big">${c.displayName}</div></div>`;
            });
        };
        window.closeSeeMore = () => document.getElementById('seeMoreOverlay').style.display = 'none';

        function openChat(friendId, friendName) {
            const ids = [myId, friendId].sort();
            activeChatId = ids[0] + "_" + ids[1];
            document.getElementById('chatTitle').innerText = friendName;
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('chatPage').style.display = 'flex';
            document.getElementById('seeMoreOverlay').style.display = 'none';
            document.getElementById('sidePanels').classList.remove('open');
            onValue(ref(db, `chats/${activeChatId}`), (snap) => {
                const mDiv = document.getElementById('messages'); mDiv.innerHTML = "";
                snap.forEach(m => {
                    const isMe = m.val().authorUid === myId;
                    mDiv.innerHTML += `<div style="display:flex; flex-direction:column; max-width:85%; align-self:${isMe?'flex-end':'flex-start'}; align-items:${isMe?'flex-end':'flex-start'}"><div class="bubble" style="background:${isMe?'var(--msg-me)':'var(--msg-friend)'}; color:white; border-radius:18px; border-bottom-${isMe?'right':'left'}-radius:4px;">${m.val().text}</div></div>`;
                });
                mDiv.scrollTop = mDiv.scrollHeight;
            });
        }

        function loadRequests() {
            onValue(ref(db, `requests/${myId}`), (snap) => {
                const list = document.getElementById('requestsList'); list.innerHTML = "";
                snap.forEach(c => {
                    list.innerHTML += `<div style="padding:12px; background:#383a40; border-radius:10px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;"><span>${c.val().fromName}</span><button onclick="accept('${c.key}')" style="background:var(--online); color:white; border:none; padding:5px 10px; border-radius:5px;">OK</button></div>`;
                });
            });
        }

        window.accept = async (fid) => {
            await set(ref(db, `contacts/${myId}/${fid}`), { uid: fid });
            await set(ref(db, `contacts/${fid}/${myId}`), { uid: myId });
            await remove(ref(db, `requests/${myId}/${fid}`));
        };

        document.getElementById('sendBtn').onclick = () => {
            const v = document.getElementById('userInput').value.trim();
            if(v && activeChatId) push(ref(db, `chats/${activeChatId}`), { authorUid: myId, text: v });
            document.getElementById('userInput').value = "";
        };

        document.getElementById('loginBtn').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value);
    </script>
</body>
</html>

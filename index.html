<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BP-Contact | Force Notif</title>
    <style>
        :root {
            --bg-main: #1e1f22; --bg-sidebar: #2b2d31; --bg-chat: #313338;
            --accent: #5865f2; --msg-me: #5865f2; --msg-friend: #383a40;
            --text-main: #dbdee1; --text-muted: #949ba4; --online: #23a559;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg-main); color: var(--text-main); overflow: hidden; position: fixed; }
        .app-container { display: flex; height: 100vh; width: 100vw; }

        /* Menu Latéral */
        .side-panels { display: flex; height: 100%; transition: transform 0.3s ease; z-index: 1000; flex-shrink: 0; }
        .contacts-bar { width: 72px; background: var(--bg-main); display: flex; flex-direction: column; align-items: center; padding-top: 15px; gap: 12px; }
        .bp-logo { width: 48px; height: 48px; background: var(--accent); border-radius: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; color: white; }
        .contact-circle { position: relative; width: 48px; height: 48px; background: var(--bg-sidebar); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; font-size: 18px; text-transform: uppercase; }
        
        /* Badge Notification */
        .notif-dot { position: absolute; top: 0; right: 0; width: 14px; height: 14px; background: #ed4245; border-radius: 50%; border: 2px solid var(--bg-main); display: none; }
        .notif-dot.active { display: block; }

        .sidebar-info { width: 240px; background: var(--bg-sidebar); display: flex; flex-direction: column; border-right: 1px solid #1e1f22; }
        .sidebar-header { height: 50px; padding: 0 16px; display: flex; align-items: center; font-weight: bold; border-bottom: 1px solid #1e1f22; justify-content: space-between; }

        /* Zone Chat */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-chat); min-width: 0; }
        .chat-header { height: 50px; padding: 0 15px; display: flex; align-items: center; border-bottom: 1px solid #26272d; font-weight: bold; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .input-box { padding: 15px; background: var(--bg-chat); }
        .input-wrap { background: #383a40; border-radius: 8px; padding: 10px 15px; }
        #userInput { background: transparent; border: none; color: white; width: 100%; outline: none; }

        /* Bulles */
        .msg-wrapper { display: flex; flex-direction: column; max-width: 80%; margin-bottom: 5px; }
        .msg-me { align-self: flex-end; align-items: flex-end; }
        .msg-friend { align-self: flex-start; align-items: flex-start; }
        .bubble { padding: 10px 16px; border-radius: 18px; font-size: 15px; line-height: 1.4; }
        .msg-me .bubble { background: var(--msg-me); color: white; border-bottom-right-radius: 4px; }
        .msg-friend .bubble { background: var(--msg-friend); color: var(--text-main); border-bottom-left-radius: 4px; }

        /* Alertes */
        #topAlert { position: fixed; top: -70px; left: 50%; transform: translateX(-50%); background: var(--accent); color: white; padding: 12px 25px; border-radius: 30px; z-index: 9999; transition: 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28); box-shadow: 0 5px 20px rgba(0,0,0,0.5); font-weight: bold; }
        #topAlert.show { top: 20px; }

        @media (max-width: 768px) {
            #mobileMenuBtn { display: block; margin-right: 10px; }
            .side-panels { position: absolute; transform: translateX(-100%); width: 312px; height: 100%; }
            .side-panels.open { transform: translateX(0); }
        }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .card { background: var(--bg-sidebar); padding: 25px; border-radius: 15px; width: 90%; max-width: 320px; text-align: center; }
        .card input { width: 100%; padding: 12px; background: #1e1f22; border: 1px solid #444; border-radius: 8px; color: white; margin: 10px 0; outline: none; }
        .btn { width: 100%; padding: 12px; background: var(--accent); border: none; color: white; cursor: pointer; border-radius: 8px; font-weight: bold; margin-top: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="topAlert">Nouveau message !</div>

    <div id="loginOverlay" class="overlay">
        <div class="card">
            <h2>BlocPlay</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Mot de passe">
            <button class="btn" id="loginBtn">Connexion</button>
        </div>
    </div>

    <div class="app-container">
        <div class="side-panels" id="sidePanels">
            <nav class="contacts-bar">
                <div class="bp-logo" id="bpMenuClose">BP</div>
                <div id="contactsIconsList" style="display:contents;"></div>
                <div class="contact-circle" style="color:var(--online); border: 2px dashed #444;" onclick="alert('Indisponible dans cette version simplifiée')">+</div>
            </nav>
            <aside class="sidebar-info">
                <div class="sidebar-header">Amis <span id="status" style="font-size:10px; color:var(--online)">● LIVE</span></div>
                <div id="contactsListNames" style="padding:15px; flex:1; overflow-y:auto;"></div>
                <button id="logoutBtn" style="padding:15px; background:none; border:none; color:#ed4245; cursor:pointer; font-weight:bold; text-align:left;">DÉCONNEXION</button>
            </aside>
        </div>

        <main class="chat-area">
            <header class="chat-header">
                <button id="mobileMenuBtn" style="display:none; background:var(--accent); border:none; color:white; padding:5px 10px; border-radius:5px; margin-right:10px;">MENU</button>
                <span id="chatTitle">Sélectionnez un ami</span>
            </header>
            <div id="messages"></div>
            <div class="input-box">
                <div class="input-wrap">
                    <input type="text" id="userInput" placeholder="Message..." disabled>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, get, query, orderByChild, equalTo, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQHLAG_Dvnc-a8LDJ__05oRwMmEtUkn04",
            authDomain: "blocplay-a9417.firebaseapp.com",
            databaseURL: "https://blocplay-a9417-default-rtdb.firebaseio.com",
            projectId: "blocplay-a9417",
            storageBucket: "blocplay-a9417.firebasestorage.app",
            messagingSenderId: "540161549188",
            appId: "1:540161549188:web:ffe799fa3747cb42f333d1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let currentUser = null, myId = null, activeChatId = null;
        let knownMsgs = new Set();
        let firstLoadDone = false;

        // Audio de secours (Ping)
        const ping = new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3');

        function forceAlert(sender, text) {
            // Vibration
            if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
            
            // Son
            ping.play().catch(()=>{});

            // Bannière
            const alertBox = document.getElementById('topAlert');
            alertBox.innerText = `${sender} : ${text}`;
            alertBox.classList.add('show');
            setTimeout(() => alertBox.classList.remove('show'), 4000);

            // Notification Système (si autorisée)
            if(Notification.permission === "granted") {
                new Notification(sender, { body: text });
            }
        }

        // --- AUTH ---
        document.getElementById('loginBtn').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value);
        };
        document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const snap = await get(query(ref(db, 'users'), orderByChild('email'), equalTo(user.email.toLowerCase())));
                myId = snap.exists() ? Object.keys(snap.val())[0] : user.uid;
                document.getElementById('loginOverlay').classList.add('hidden');
                
                Notification.requestPermission();
                loadContacts();
                
                // On attend 3s pour ne pas notifier les vieux messages
                setTimeout(() => { firstLoadDone = true; }, 3000);
            } else {
                document.getElementById('loginOverlay').classList.remove('hidden');
            }
        });

        function loadContacts() {
            onValue(ref(db, `contacts/${myId}`), (snap) => {
                const iconList = document.getElementById('contactsIconsList');
                const nameList = document.getElementById('contactsListNames');
                iconList.innerHTML = ""; nameList.innerHTML = "";
                
                snap.forEach(c => {
                    const fid = c.val().uid;
                    get(ref(db, `users/${fid}`)).then(uSnap => {
                        const name = uSnap.val().displayName || uSnap.val().email.split('@')[0];
                        
                        // Icône
                        const icon = document.createElement('div');
                        icon.className = "contact-circle";
                        icon.id = "icon-" + fid;
                        icon.innerHTML = `${name[0]}<div class="notif-dot"></div>`;
                        icon.onclick = () => { openChat(fid, name); icon.querySelector('.notif-dot').classList.remove('active'); };
                        iconList.appendChild(icon);

                        // Nom liste
                        const nDiv = document.createElement('div');
                        nDiv.className = "contact-name-item";
                        nDiv.style = "padding:12px; cursor:pointer; background:#2b2d31; border-radius:8px; margin-bottom:5px;";
                        nDiv.innerText = name;
                        nDiv.onclick = () => openChat(fid, name);
                        nameList.appendChild(nDiv);

                        // Ecoute des messages pour cet ami
                        listenForMsgs(fid, name);
                    });
                });
            });
        }

        function listenForMsgs(fid, fname) {
            const ids = [String(myId), String(fid)].sort();
            const chatId = ids[0] + "_" + ids[1];

            onValue(query(ref(db, `chats/${chatId}`), limitToLast(1)), (snap) => {
                snap.forEach(mChild => {
                    const m = mChild.val();
                    if (firstLoadDone && m.authorUid !== myId && !knownMsgs.has(mChild.key)) {
                        if (chatId !== activeChatId) {
                            forceAlert(fname, m.text);
                            const dot = document.querySelector(`#icon-${fid} .notif-dot`);
                            if(dot) dot.classList.add('active');
                        }
                    }
                    knownMsgs.add(mChild.key);
                });
            });
        }

        function openChat(friendId, friendName) {
            const ids = [String(myId), String(friendId)].sort();
            activeChatId = ids[0] + "_" + ids[1];
            document.getElementById('chatTitle').innerText = friendName;
            document.getElementById('userInput').disabled = false;
            
            onValue(ref(db, `chats/${activeChatId}`), (snap) => {
                const mDiv = document.getElementById('messages');
                mDiv.innerHTML = "";
                snap.forEach(m => {
                    const v = m.val();
                    const isMe = v.authorUid === myId;
                    const wrap = document.createElement('div');
                    wrap.className = `msg-wrapper ${isMe ? 'msg-me' : 'msg-friend'}`;
                    wrap.innerHTML = `<div class="bubble">${v.text}</div>`;
                    mDiv.appendChild(wrap);
                    knownMsgs.add(m.key);
                });
                mDiv.scrollTop = mDiv.scrollHeight;
            });
            if(window.innerWidth <= 768) document.getElementById('sidePanels').classList.remove('open');
        }

        document.getElementById('userInput').onkeydown = (e) => {
            if(e.key === "Enter" && e.target.value.trim()) {
                push(ref(db, `chats/${activeChatId}`), {
                    authorUid: myId,
                    text: e.target.value,
                    ts: Date.now()
                });
                e.target.value = "";
            }
        };

        // Mobile Menu
        document.getElementById('mobileMenuBtn').onclick = () => document.getElementById('sidePanels').classList.add('open');
        document.getElementById('bpMenuClose').onclick = () => document.getElementById('sidePanels').classList.remove('open');
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BP-Contact | Final</title>
    <style>
        :root {
            --bg-main: #1e1f22;
            --bg-sidebar: #2b2d31;
            --bg-chat: #313338;
            --accent: #5865f2;
            --msg-me: #5865f2;
            --msg-friend: #383a40;
            --text-main: #dbdee1;
            --text-muted: #949ba4;
            --online: #23a559;
            --danger: #ed4245;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg-main); color: var(--text-main); overflow: hidden; position: fixed; }
        .app-container { display: flex; height: 100vh; width: 100vw; }

        /* Sidebar */
        .side-panels { display: flex; height: 100%; transition: transform 0.3s ease; z-index: 1000; flex-shrink: 0; }
        .contacts-bar { width: 72px; background: var(--bg-main); display: flex; flex-direction: column; align-items: center; padding-top: 15px; gap: 12px; }
        .bp-logo { width: 48px; height: 48px; background: var(--accent); border-radius: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; color: white; }
        .contact-circle { width: 48px; height: 48px; background: var(--bg-sidebar); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .sidebar-info { width: 240px; background: var(--bg-sidebar); display: flex; flex-direction: column; border-right: 1px solid #1e1f22; }

        /* Main Content */
        .main-content { flex: 1; position: relative; height: 100%; background: var(--bg-chat); display: flex; flex-direction: column; min-width: 0; }

        /* Dashboard */
        .scroll-page { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .status-header { display: flex; justify-content: space-between; align-items: center; }
        .status-label { font-size: 20px; color: white; font-weight: 500; }
        .view-more { color: var(--text-muted); cursor: pointer; font-size: 14px; text-decoration: underline; }
        
        .contact-card { background: white; border-radius: 25px; padding: 15px 20px; color: #333; display: flex; align-items: center; gap: 15px; margin-top: 10px; }
        .user-icon-wrap { width: 50px; height: 50px; background: #444; border-radius: 50%; position: relative; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; }
        .status-dot { position: absolute; bottom: 0; right: 0; width: 15px; height: 15px; border-radius: 50%; border: 2.5px solid white; }
        .status-dot.online { background: var(--online); }
        .status-dot.offline { background: #808080; }
        .user-name-big { font-size: 24px; color: #1e1f22; font-weight: 400; overflow: hidden; text-overflow: ellipsis; }

        /* Overlay Voir Plus */
        #seeMoreOverlay { position: absolute; inset: 0; background: var(--bg-chat); z-index: 10; display: none; flex-direction: column; padding: 20px; }

        /* Chat */
        #chatPage { display: none; flex-direction: column; height: 100%; position: relative; }
        .chat-header { height: 60px; padding: 0 15px; display: flex; align-items: center; border-bottom: 1px solid #26272d; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        
        /* Input Area (Fixée en bas) */
        .chat-input-area { padding: 15px 20px; padding-bottom: calc(15px + env(safe-area-inset-bottom)); background: var(--bg-chat); border-top: 1px solid #26272d; }
        .input-wrap { background: #383a40; border-radius: 12px; padding: 8px 15px; display: flex; align-items: center; gap: 10px; }
        #userInput { background: transparent; border: none; color: white; flex: 1; outline: none; font-size: 16px; }
        #sendBtn { background: var(--accent); color: white; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; }

        #contextMenu { position: fixed; background: #111214; border-radius: 8px; padding: 8px; z-index: 3000; display: none; width: 160px; }
        .menu-item { padding: 12px; cursor: pointer; border-radius: 4px; font-size: 14px; color: white; }
        .hamburger { background: none; border: none; color: white; font-size: 28px; cursor: pointer; margin-right: 15px; }

        @media (max-width: 768px) {
            .side-panels { position: absolute; transform: translateX(-100%); width: 300px; height: 100%; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
            .side-panels.open { transform: translateX(0); }
        }
        .overlay-full { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .auth-card { background: var(--bg-sidebar); padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body onclick="hideMenu()">
<div id="contextMenu">
        <div class="menu-item" onclick="editMsg()">Modifier</div>
        <div class="menu-item" style="color:var(--danger)" onclick="deleteMsg()">Supprimer</div>
    </div>

    <div id="loginOverlay" class="overlay-full">
        <div class="auth-card">
            <h2 style="margin-bottom:20px;">BlocPlay</h2>
            <input type="email" id="email" placeholder="Email" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:none; background:#1e1f22; color:white;">
            <input type="password" id="pass" placeholder="Mot de passe" style="width:100%; padding:12px; margin-bottom:20px; border-radius:8px; border:none; background:#1e1f22; color:white;">
            <button id="loginBtn" style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:8px; font-weight:bold;">CONNEXION</button>
        </div>
    </div>

    <div id="addModal" class="overlay-full hidden">
        <div class="auth-card">
            <h3>Ajouter un contact</h3>
            <input type="email" id="friendEmail" placeholder="Email du contact" style="width:100%; padding:12px; border-radius:8px; border:none; background:#1e1f22; color:white;">
            <button id="sendInviteBtn" style="width:100%; margin-top:15px; padding:12px; background:var(--accent); color:white; border:none; border-radius:8px;">Envoyer</button>
            <button onclick="document.getElementById('addModal').classList.add('hidden')" style="background:none; border:none; color:var(--text-muted); margin-top:15px;">Annuler</button>
        </div>
    </div>

    <div class="app-container">
        <div class="side-panels" id="sidePanels">
            <nav class="contacts-bar">
                <div class="bp-logo" onclick="showHome()">BP</div>
                <div id="contactsIconsList" style="display:contents;"></div>
                <div class="contact-circle" style="color:var(--online); border:2px dashed #35363c; font-size:24px;" onclick="document.getElementById('addModal').classList.remove('hidden')">+</div>
            </nav>
            <aside class="sidebar-info">
                <div style="padding:20px; font-weight:bold; border-bottom:1px solid #1e1f22;">Demandes</div>
                <div id="requestsList" style="padding:10px;"></div>
                <button onclick="auth.signOut().then(()=>location.reload())" style="margin-top:auto; padding:20px; background:none; border:none; color:var(--danger); cursor:pointer; font-weight:bold;">DÉCONNEXION</button>
            </aside>
        </div>

        <div class="main-content">
            <div id="homePage" class="scroll-page">
                <div style="display:flex; align-items:center; font-size:24px; color:white; font-weight:bold;">
                    <button class="hamburger" onclick="toggleMenu()">☰</button> Contacts
                </div>
                <section>
                    <div class="status-header">
                        <div class="status-label" id="onLabel">En ligne (0) :</div>
                        <div class="view-more" onclick="openSeeMore('online')">Voir plus ></div>
                    </div>
                    <div id="onPreview"></div>
                </section>
                <section>
                    <div class="status-header">
                        <div class="status-label" id="offLabel">Hors ligne (0) :</div>
                        <div class="view-more" onclick="openSeeMore('offline')">Voir plus ></div>
                    </div>
                    <div id="offPreview"></div>
                </section>
            </div>

            <div id="seeMoreOverlay">
                <div style="display:flex; align-items:center; margin-bottom:20px;">
                    <button class="hamburger" onclick="toggleMenu()">☰</button>
                    <span id="seeMoreTitle" style="font-size:22px; font-weight:bold;">Liste</span>
                    <button onclick="closeSeeMore()" style="margin-left:auto; background:none; border:none; color:var(--accent); font-weight:bold;">Fermer</button>
                </div>
                <div id="seeMoreGrid" style="display:flex; flex-direction:column; gap:12px; overflow-y:auto;"></div>
            </div>

            <div id="chatPage">
                <header class="chat-header">
                    <button class="hamburger" onclick="toggleMenu()">☰</button>
                    <span id="chatTitle" style="font-size:18px; font-weight:bold;">Pseudo</span>
                </header>
                <div id="messages"></div>
                <div class="chat-input-area">
                    <div class="input-wrap">
                        <input type="text" id="userInput" placeholder="Écrire un message...">
                        <button id="sendBtn">➤</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, get, query, orderByChild, equalTo, remove, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQHLAG_Dvnc-a8LDJ__05oRwMmEtUkn04",
            authDomain: "blocplay-a9417.firebaseapp.com",
            databaseURL: "https://blocplay-a9417-default-rtdb.firebaseio.com",
            projectId: "blocplay-a9417",
            storageBucket: "blocplay-a9417.firebasestorage.app",
            messagingSenderId: "540161549188",
            appId: "1:540161549188:web:ffe799fa3747cb42f333d1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        let myId = null, activeChatId = null, selectedMsgId = null, contactsList = [];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                myId = user.uid;
                const userRef = ref(db, `users/${myId}`);
                await update(userRef, { uid: myId, email: user.email.toLowerCase(), displayName: user.email.split('@')[0], status: "online" });
                onDisconnect(userRef).update({ status: "offline" });
                document.getElementById('loginOverlay').classList.add('hidden');
                loadContacts(); loadRequests();
            } else { document.getElementById('loginOverlay').classList.remove('hidden'); }
        });

        window.toggleMenu = () => document.getElementById('sidePanels').classList.toggle('open');
        window.showHome = () => {
            document.getElementById('homePage').style.display = 'flex';
            document.getElementById('chatPage').style.display = 'none';
            document.getElementById('seeMoreOverlay').style.display = 'none';
            document.getElementById('sidePanels').classList.remove('open');
            activeChatId = null;
        };

        window.openSeeMore = (type) => {
            const grid = document.getElementById('seeMoreGrid'); grid.innerHTML = "";
            document.getElementById('seeMoreOverlay').style.display = 'flex';
            document.getElementById('seeMoreTitle').innerText = type === 'online' ? "En ligne" : "Hors ligne";
            contactsList.filter(c => c.status === type).forEach(c => {
                grid.innerHTML += `<div class="contact-card"><div class="user-icon-wrap">${c.displayName[0]}<div class="status-dot ${c.status}"></div></div><div class="user-name-big">${c.displayName}</div></div>`;
            });
        };
        window.closeSeeMore = () => document.getElementById('seeMoreOverlay').style.display = 'none';

        function loadContacts() {
            onValue(ref(db, `contacts/${myId}`), (snap) => {
                const iconList = document.getElementById('contactsIconsList'); iconList.innerHTML = "";
                contactsList = [];
                snap.forEach(c => {
                    const fid = c.val().uid;
                    onValue(ref(db, `users/${fid}`), (uSnap) => {
                        const data = uSnap.val(); if(!data) return;
                        contactsList = contactsList.filter(u => u.uid !== fid); contactsList.push(data);
                        
                        const icon = document.createElement('div');
                        icon.className = "contact-circle"; icon.innerText = data.displayName[0];
                        icon.onclick = () => openChat(fid, data.displayName);
                        iconList.appendChild(icon);

                        const onArr = contactsList.filter(u => u.status === 'online');
                        const offArr = contactsList.filter(u => u.status === 'offline');
                        document.getElementById('onLabel').innerText = `En ligne (${onArr.length}) :`;
                        document.getElementById('offLabel').innerText = `Hors ligne (${offArr.length}) :`;

                        const renderCard = (u) => `<div class="contact-card"><div class="user-icon-wrap">${u.displayName[0]}<div class="status-dot ${u.status}"></div></div><div class="user-name-big">${u.displayName}</div></div>`;
                        document.getElementById('onPreview').innerHTML = onArr.length ? renderCard(onArr[0]) : "";
                        document.getElementById('offPreview').innerHTML = offArr.length ? renderCard(offArr[0]) : "";
                    });
                });
            });
        }

        function openChat(friendId, friendName) {
            const ids = [myId, friendId].sort();
            activeChatId = ids[0] + "_" + ids[1];
            document.getElementById('chatTitle').innerText = friendName;
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('seeMoreOverlay').style.display = 'none';
            document.getElementById('chatPage').style.display = 'flex';
            document.getElementById('sidePanels').classList.remove('open');
            onValue(ref(db, `chats/${activeChatId}`), (snap) => {
                const mDiv = document.getElementById('messages'); mDiv.innerHTML = "";
                snap.forEach(m => {
                    const isMe = m.val().authorUid === myId;
                    const wrap = document.createElement('div');
                    wrap.style = `display:flex; flex-direction:column; max-width:85%; align-self:${isMe?'flex-end':'flex-start'}; align-items:${isMe?'flex-end':'flex-start'}`;
                    wrap.innerHTML = `<div class="bubble" oncontextmenu="window.showCtx(event, '${m.key}', ${isMe})" style="background:${isMe?'var(--msg-me)':'var(--msg-friend)'}; color:white; padding:10px 16px; border-radius:18px;">${m.val().text}</div>`;
                    mDiv.appendChild(wrap);
                });
                mDiv.scrollTop = mDiv.scrollHeight;
            });
        }

        window.showCtx = (e, id, isMe) => { if(!isMe) return; e.preventDefault(); selectedMsgId = id; const m = document.getElementById('contextMenu'); m.style.display = 'block'; m.style.left = e.pageX + 'px'; m.style.top = e.pageY + 'px'; };
        window.hideMenu = () => document.getElementById('contextMenu').style.display = 'none';
        window.deleteMsg = () => remove(ref(db, `chats/${activeChatId}/${selectedMsgId}`));
        window.editMsg = () => { const t = prompt("Modifier :"); if(t) update(ref(db, `chats/${activeChatId}/${selectedMsgId}`), { text: t + " (modifié)" }); };

        document.getElementById('sendBtn').onclick = () => {
            const val = document.getElementById('userInput').value.trim();
            if(val && activeChatId) push(ref(db, `chats/${activeChatId}`), { authorUid: myId, text: val });
            document.getElementById('userInput').value = "";
        };

        function loadRequests() {
            onValue(ref(db, `requests/${myId}`), (snap) => {
                const list = document.getElementById('requestsList'); list.innerHTML = "";
                snap.forEach(child => {
                    const div = document.createElement('div');
                    div.style = "padding:10px; background:#383a40; margin-bottom:8px; border-radius:8px; display:flex; justify-content:space-between; align-items:center; font-size:13px;";
                    div.innerHTML = `<span>${child.val().fromName}</span><button onclick="accept('${child.key}')" style="background:var(--online); border:none; color:white; border-radius:4px; padding:4px 8px;">OK</button>`;
                    list.appendChild(div);
                });
            });
        }

        window.accept = async (fid) => {
            await set(ref(db, `contacts/${myId}/${fid}`), { uid: fid });
            await set(ref(db, `contacts/${fid}/${myId}`), { uid: myId });
            await remove(ref(db, `requests/${myId}/${fid}`));
        };

        document.getElementById('sendInviteBtn').onclick = async () => {
            const email = document.getElementById('friendEmail').value.trim().toLowerCase();
            const q = query(ref(db, 'users'), orderByChild('email'), equalTo(email));
            const snap = await get(q);
            if(snap.exists()){
                const tid = Object.keys(snap.val())[0];
                const me = await get(ref(db, `users/${myId}`));
                await set(ref(db, `requests/${tid}/${myId}`), { fromUid: myId, fromName: me.val().displayName });
                alert("Demande envoyée !"); document.getElementById('addModal').classList.add('hidden');
            }
        };

        document.getElementById('loginBtn').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BP-Contact | Connexion BlocPlay</title>
    
    <style>
        :root {
            --bg-servers: #1e1f22;
            --bg-channels: #2b2d31;
            --bg-chat: #313338;
            --bg-input: #383a40;
            --text-main: #dbdee1;
            --accent: #5865f2;
            --danger: #ed4245;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-servers); color: var(--text-main); overflow: hidden; }

        .app-container { display: flex; height: 100vh; width: 100vw; }

        /* --- SIDEBAR SERVEURS (STYLE DISCORD) --- */
        .server-sidebar {
            width: 72px;
            background-color: var(--bg-servers);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 12px;
            gap: 8px;
            flex-shrink: 0;
        }

        .server-icon {
            width: 48px; height: 48px;
            background-color: var(--bg-chat);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
            font-weight: bold; font-size: 14px;
            color: white;
            text-decoration: none;
        }

        .server-icon:hover, .server-icon.active {
            border-radius: 30%;
            background-color: var(--accent);
        }

        .separator { width: 32px; height: 2px; background: #35363c; margin: 4px 0; }

        /* --- CHAT --- */
        .chat-container { flex: 1; display: flex; flex-direction: column; background-color: var(--bg-chat); position: relative; }

        .chat-header {
            height: 48px; padding: 0 16px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
            font-weight: bold; font-size: 15px;
            background: var(--bg-chat);
        }

        #messageList { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }

        /* Message design */
        .message { display: flex; gap: 16px; }
        .avatar-circle { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; color: white; }
        .msg-info { display: flex; flex-direction: column; }
        .msg-user { font-weight: bold; color: white; margin-right: 8px; }
        .msg-time { font-size: 12px; color: #949ba4; }
        .msg-text { font-size: 15px; color: #dbdee1; margin-top: 2px; line-height: 1.4; }

        .input-area { padding: 0 16px 24px 16px; }
        .input-box { background: var(--bg-input); border-radius: 8px; padding: 11px 16px; }
        .input-box input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 15px; }

        /* --- LOGIN OVERLAY --- */
        #authOverlay {
            position: absolute; inset: 0;
            background: var(--bg-servers);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
        }

        .auth-card {
            background: var(--bg-channels);
            padding: 32px; border-radius: 8px;
            width: 90%; max-width: 420px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .auth-card h2 { margin-bottom: 8px; color: white; }
        .auth-card p { color: #b5bac1; font-size: 15px; margin-bottom: 24px; }

        .field { text-align: left; margin-bottom: 20px; }
        .field label { display: block; font-size: 12px; font-weight: bold; color: #b5bac1; margin-bottom: 8px; text-transform: uppercase; }
        .field input { width: 100%; padding: 10px; background: #1e1f22; border: none; border-radius: 3px; color: white; outline: none; }
        
        .auth-btn { width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 3px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        .auth-btn:hover { background: #4752c4; }

        .register-link { margin-top: 16px; font-size: 14px; color: #b5bac1; }
        .register-link a { color: #00a8fc; text-decoration: none; font-weight: 500; }
        .register-link a:hover { text-decoration: underline; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="app-container">
        <nav class="server-sidebar">
            <div class="server-icon active">BP</div>
            <div class="separator"></div>
            <div class="server-icon">#</div>
            <div class="server-icon" style="font-size: 10px;">PROJ</div>
        </nav>

        <main class="chat-container">
            
            <div id="authOverlay">
                <div class="auth-card">
                    <h2>Content de vous revoir !</h2>
                    <p>Connectez-vous avec votre compte BlocPlay.</p>
                    
                    <div class="field">
                        <label>E-mail</label>
                        <input type="email" id="authEmail" required>
                    </div>
                    
                    <div class="field">
                        <label>Mot de passe</label>
                        <input type="password" id="authPassword" required>
                    </div>
                    
                    <button class="auth-btn" id="loginBtn">Se connecter</button>
                    
                    <div class="register-link">
                        Pas encore de compte ? <br>
                        <a href="https://blocplay-beta.github.io" target="_blank">S'inscrire sur BlocPlay-beta</a>
                    </div>
                </div>
            </div>

            <header class="chat-header">
                <span># flux-général</span>
                <button onclick="logout()" id="logoutBtn" class="hidden" style="background:none; border:none; color:var(--danger); cursor:pointer; font-weight:bold;">Déconnexion</button>
            </header>

            <div id="messageList"></div>

            <div class="input-area">
                <div class="input-box">
                    <input type="text" id="userInput" placeholder="Envoyer un message dans #flux-général">
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // CONFIG FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAQHLAG_Dvnc-a8LDJ__05oRwMmEtUkn04",
            authDomain: "blocplay-a9417.firebaseapp.com",
            databaseURL: "https://blocplay-a9417-default-rtdb.firebaseio.com",
            projectId: "blocplay-a9417",
            storageBucket: "blocplay-a9417.firebasestorage.app",
            messagingSenderId: "540161549188",
            appId: "1:540161549188:web:ffe799fa3747cb42f333d1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let currentUser = null;

        // --- GESTION CONNEXION ---
        const authOverlay = document.getElementById('authOverlay');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');

        loginBtn.onclick = async () => {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;

            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                alert("Erreur : Compte introuvable ou mot de passe incorrect.");
                console.error(error);
            }
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                authOverlay.classList.add('hidden');
                logoutBtn.classList.remove('hidden');
            } else {
                currentUser = null;
                authOverlay.classList.remove('hidden');
                logoutBtn.classList.add('hidden');
            }
        });

        // --- GESTION MESSAGES ---
        const messageList = document.getElementById('messageList');
        const userInput = document.getElementById('userInput');

        const sendMessage = () => {
            if (!currentUser) return;
            const text = userInput.value.trim();
            if (text === "") return;

            push(ref(db, 'messages'), {
                text: text,
                uid: currentUser.uid,
                name: currentUser.displayName || currentUser.email.split('@')[0],
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            });
            userInput.value = "";
        };

        userInput.onkeydown = (e) => { if(e.key === "Enter") sendMessage(); };

        onChildAdded(ref(db, 'messages'), (data) => {
            const msg = data.val();
            const initial = msg.name ? msg.name.charAt(0).toUpperCase() : "?";
            
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `
                <div class="avatar-circle">${initial}</div>
                <div class="msg-info">
                    <div><span class="msg-user">${msg.name}</span><span class="msg-time">${msg.time}</span></div>
                    <div class="msg-text">${msg.text}</div>
                </div>
            `;
            messageList.appendChild(div);
            messageList.scrollTop = messageList.scrollHeight;
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BP-Contact | BlocPlay</title>
    
    <style>
        :root {
            --sidebar-bg: #2f3136;
            --chat-bg: #36393f;
            --header-bg: #36393f;
            --text-color: #dcddde;
            --accent-color: #5865f2;
            --input-bg: #40444b;
            --online-green: #43b581;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: var(--chat-bg); color: var(--text-color); overflow: hidden; }

        .app-container { display: flex; height: 100%; width: 100%; }

        /* --- SIDEBAR --- */
        .sidebar { width: 300px; background-color: var(--sidebar-bg); display: flex; flex-direction: column; border-right: 1px solid #202225; transition: transform 0.3s ease; }
        .sidebar-header { padding: 20px; font-size: 1.2rem; font-weight: bold; border-bottom: 1px solid #202225; display: flex; justify-content: space-between; align-items: center; color: white; }
        
        .user-profile { padding: 15px; background: #292b2f; display: flex; align-items: center; gap: 10px; border-top: 1px solid #202225; }
        .user-profile img { width: 32px; height: 32px; border-radius: 50%; }

        .contact-list { flex: 1; overflow-y: auto; padding: 10px; }
        .contact-item { display: flex; align-items: center; padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.2s; margin-bottom: 4px; }
        .contact-item:hover { background: #393c43; }
        .contact-item.active { background: #4f545c; color: white; }

        .status-dot { width: 10px; height: 10px; background: var(--online-green); border-radius: 50%; margin-left: auto; }

        /* --- MAIN CHAT --- */
        .main-chat { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .chat-header { height: 60px; background: var(--header-bg); display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #202225; box-shadow: 0 1px 0 rgba(0,0,0,0.2); }
        .menu-btn { display: none; background: none; border: none; color: white; font-size: 24px; cursor: pointer; margin-right: 10px; }

        #messageList { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        /* Message Style */
        .msg-row { display: flex; gap: 12px; max-width: 85%; }
        .msg-row.me { align-self: flex-end; flex-direction: row-reverse; }
        .msg-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent-color); flex-shrink: 0; object-fit: cover; }
        .msg-content { display: flex; flex-direction: column; }
        .msg-author { font-size: 0.9rem; font-weight: bold; color: white; margin-bottom: 3px; }
        .msg-bubble { background: #40444b; padding: 10px 15px; border-radius: 15px; font-size: 1rem; line-height: 1.4; color: #dcddde; word-break: break-word; }
        .me .msg-bubble { background: var(--accent-color); color: white; }

        /* INPUT AREA */
        .input-area { padding: 20px; background: var(--chat-bg); }
        .input-wrapper { background: var(--input-bg); border-radius: 8px; padding: 10px 15px; display: flex; align-items: center; gap: 10px; }
        input { background: transparent; border: none; color: white; flex: 1; font-size: 1rem; outline: none; }
        .send-btn { background: none; border: none; color: var(--accent-color); font-size: 1.5rem; cursor: pointer; padding: 0; transition: 0.2s; }
        .send-btn:hover { color: #7289da; transform: scale(1.1); }

        /* AUTH BUTTON */
        .btn-auth { background: #f1c40f; color: black; border: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 12px; }

        /* MOBILE RESPONSIVE */
        @media (max-width: 768px) {
            .sidebar { position: absolute; left: -300px; height: 100%; z-index: 100; }
            .sidebar.open { transform: translateX(300px); }
            .menu-btn { display: block; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span>BlocPlay</span>
                <button class="btn-auth" id="authBtn">CONNEXION</button>
            </div>
            <div class="contact-list">
                <div class="contact-item active">
                    <div class="msg-avatar" style="width:30px; height:30px; margin-right:10px; display:flex; align-items:center; justify-content:center;">#</div>
                    <span>Flux Global</span>
                    <div class="status-dot"></div>
                </div>
            </div>
            <div class="user-profile" id="userProfile" style="display:none;">
                <img id="userPhoto" src="" alt="">
                <span id="userName" style="font-weight:bold; font-size:14px;"></span>
            </div>
        </aside>

        <main class="main-chat">
            <header class="chat-header">
                <button class="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
                <strong id="currentChannel"># Flux Global</strong>
            </header>

            <div id="messageList">
                </div>

            <footer class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="userInput" placeholder="Envoyer un message au flux global...">
                    <button class="send-btn" id="sendBtn">➤</button>
                </div>
            </footer>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // CONFIGURATION FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAQHLAG_Dvnc-a8LDJ__05oRwMmEtUkn04",
            authDomain: "blocplay-a9417.firebaseapp.com",
            databaseURL: "https://blocplay-a9417-default-rtdb.firebaseio.com",
            projectId: "blocplay-a9417",
            storageBucket: "blocplay-a9417.firebasestorage.app",
            messagingSenderId: "540161549188",
            appId: "1:540161549188:web:ffe799fa3747cb42f333d1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;

        // AUTHENTICATION
        const authBtn = document.getElementById('authBtn');
        const userProfile = document.getElementById('userProfile');

        authBtn.onclick = () => {
            if (!currentUser) {
                signInWithPopup(auth, provider);
            } else {
                signOut(auth);
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                authBtn.innerText = "DÉCONNEXION";
                authBtn.style.background = "#ed4245";
                userProfile.style.display = "flex";
                document.getElementById('userName').innerText = user.displayName;
                document.getElementById('userPhoto').src = user.photoURL;
            } else {
                currentUser = null;
                authBtn.innerText = "CONNEXION";
                authBtn.style.background = "#f1c40f";
                userProfile.style.display = "none";
            }
        });

        // MESSAGERIE
        const messageList = document.getElementById('messageList');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        const sendMessage = () => {
            if (!currentUser) return alert("Veuillez vous connecter !");
            const text = userInput.value.trim();
            if (text === "") return;

            const messagesRef = ref(db, 'messages');
            const newMessageRef = push(messagesRef);
            set(newMessageRef, {
                text: text,
                uid: currentUser.uid,
                name: currentUser.displayName,
                photo: currentUser.photoURL,
                time: serverTimestamp()
            });
            userInput.value = "";
        };

        sendBtn.onclick = sendMessage;
        userInput.onkeydown = (e) => { if(e.key === "Enter") sendMessage(); };

        // ÉCOUTE DES MESSAGES
        const messagesRef = ref(db, 'messages');
        onChildAdded(messagesRef, (data) => {
            const msg = data.val();
            const isMe = currentUser && msg.uid === currentUser.uid;
            
            const div = document.createElement('div');
            div.className = `msg-row ${isMe ? 'me' : ''}`;
            div.innerHTML = `
                <img class="msg-avatar" src="${msg.photo || 'https://via.placeholder.com/40'}" alt="avatar">
                <div class="msg-content">
                    <span class="msg-author">${msg.name}</span>
                    <div class="msg-bubble">${msg.text}</div>
                </div>
            `;
            messageList.appendChild(div);
            messageList.scrollTop = messageList.scrollHeight;
        });

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BP-Contact | Sécurisé</title>
    <style>
        :root {
            --bg-servers: #1e1f22;
            --bg-channels: #2b2d31;
            --bg-chat: #313338;
            --bg-input: #383a40;
            --text-main: #dbdee1;
            --accent: #5865f2;
            --danger: #ed4245;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg-servers); color: var(--text-main); overflow: hidden; }

        .app-container { display: flex; height: 100vh; width: 100vw; }

        /* SIDEBAR */
        .sidebar { width: 260px; background: var(--bg-channels); display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { height: 48px; padding: 0 16px; display: flex; align-items: center; font-weight: bold; border-bottom: 1px solid #1e1f22; }
        .user-list { flex: 1; overflow-y: auto; padding: 10px; }
        .user-item { display: flex; align-items: center; padding: 10px; border-radius: 4px; cursor: pointer; margin-bottom: 4px; transition: 0.2s; }
        .user-item:hover { background: #35373c; }
        .user-item.active { background: #3f4147; color: white; }
        .avatar { width: 35px; height: 35px; border-radius: 50%; background: var(--accent); margin-right: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; flex-shrink: 0; }

        /* CHAT */
        .chat-main { flex: 1; display: flex; flex-direction: column; background: var(--bg-chat); min-width: 0; }
        .chat-header { height: 48px; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #282a2e; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }

        .msg { display: flex; gap: 15px; }
        .msg-body { display: flex; flex-direction: column; }
        .msg-user { font-weight: bold; font-size: 14px; color: white; }
        .msg-text { font-size: 15px; color: #dbdee1; margin-top: 2px; }

        .input-area { padding: 0 16px 24px 16px; }
        .input-box { background: var(--bg-input); border-radius: 8px; padding: 12px; }
        input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 15px; }

        /* AUTH */
        #loginOverlay { position: absolute; inset: 0; background: var(--bg-servers); z-index: 999; display: flex; align-items: center; justify-content: center; }
        .card { background: var(--bg-channels); padding: 30px; border-radius: 8px; width: 100%; max-width: 400px; text-align: center; }
        .card input { width: 100%; padding: 12px; background: #1e1f22; border: none; border-radius: 4px; color: white; margin-bottom: 10px; }
        .btn-blue { width: 100%; padding: 12px; background: var(--accent); border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 4px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="card">
            <h2 style="color:white">BlocPlay Contact</h2>
            <p style="color:#b5bac1">Connectez-vous pour continuer</p>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="pass" placeholder="Mot de passe">
            <button class="btn-blue" id="btnLogin">Se connecter</button>
            <p style="font-size:12px; margin-top:15px; color:#b5bac1">Pas de compte ? <a href="https://blocplay-beta.github.io" target="_blank" style="color:#00a8fc; text-decoration:none">S'inscrire</a></p>
        </div>
    </div>

    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">Utilisateurs</div>
            <div class="user-list" id="userList"></div>
            <button onclick="auth.signOut()" style="padding:10px; background:var(--danger); border:none; color:white; cursor:pointer">Quitter</button>
        </aside>

        <main class="chat-main">
            <header class="chat-header">
                <span id="targetName"># Sélectionnez un contact</span>
            </header>
            <div id="messages"></div>
            <div class="input-area">
                <div class="input-box">
                    <input type="text" id="userInput" placeholder="Choisissez un utilisateur pour parler" disabled>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, onChildAdded, off } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQHLAG_Dvnc-a8LDJ__05oRwMmEtUkn04",
            authDomain: "blocplay-a9417.firebaseapp.com",
            databaseURL: "https://blocplay-a9417-default-rtdb.firebaseio.com",
            projectId: "blocplay-a9417",
            storageBucket: "blocplay-a9417.firebasestorage.app",
            messagingSenderId: "540161549188",
            appId: "1:540161549188:web:ffe799fa3747cb42f333d1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let currentUser = null;
        let activeChatId = null;

        // --- AUTHENTIFICATION ---
        document.getElementById('btnLogin').onclick = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            signInWithEmailAndPassword(auth, e, p).catch(() => alert("Identifiants incorrects"));
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginOverlay').classList.add('hidden');
                // Enregistre l'utilisateur dans l'annuaire (nécessaire pour les règles "users")
                set(ref(db, 'users/' + user.uid), {
                    uid: user.uid,
                    name: user.email.split('@')[0],
                    email: user.email
                });
                loadUsers();
            } else {
                document.getElementById('loginOverlay').classList.remove('hidden');
                document.getElementById('userList').innerHTML = "";
                document.getElementById('messages').innerHTML = "";
            }
        });

        // --- CHARGEMENT LISTE DES GENS ---
        function loadUsers() {
            onValue(ref(db, 'users'), (snap) => {
                const list = document.getElementById('userList');
                list.innerHTML = "";
                snap.forEach(child => {
                    const u = child.val();
                    if(u.uid === currentUser.uid) return;
                    
                    const div = document.createElement('div');
                    div.className = "user-item";
                    div.innerHTML = `<div class="avatar">${u.name[0].toUpperCase()}</div><span>${u.name}</span>`;
                    div.onclick = () => openChat(u);
                    list.appendChild(div);
                });
            });
        }

        // --- OUVERTURE CHAT PRIVÉ ---
        function openChat(target) {
            // Important pour tes règles pro : le chatId doit contenir les deux UIDs
            const ids = [currentUser.uid, target.uid].sort();
            const newChatId = ids[0] + "_" + ids[1];
            
            if(activeChatId) off(ref(db, 'chats/' + activeChatId));
            activeChatId = newChatId;

            document.getElementById('targetName').innerText = "@ " + target.name;
            document.getElementById('userInput').disabled = false;
            document.getElementById('userInput').placeholder = "Message à " + target.name;
            
            const msgArea = document.getElementById('messages');
            msgArea.innerHTML = "";

            onChildAdded(ref(db, 'chats/' + activeChatId), (data) => {
                const m = data.val();
                const d = document.createElement('div');
                d.className = "msg";
                d.innerHTML = `
                    <div class="avatar">${m.author[0].toUpperCase()}</div>
                    <div class="msg-body">
                        <span class="msg-user">${m.author}</span>
                        <span class="msg-text">${m.text}</span>
                    </div>`;
                msgArea.appendChild(d);
                msgArea.scrollTop = msgArea.scrollHeight;
            });
        }

        // --- ENVOI ---
        document.getElementById('userInput').onkeydown = (e) => {
            if(e.key === "Enter" && activeChatId) {
                const txt = e.target.value.trim();
                if(!txt) return;
                push(ref(db, 'chats/' + activeChatId), {
                    uid: currentUser.uid,
                    author: currentUser.email.split('@')[0],
                    text: txt,
                    time: Date.now()
                });
                e.target.value = "";
            }
        };
    </script>
</body>
</html>

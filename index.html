<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BP-Contact | Mode Barre de Contacts</title>
    <style>
        :root {
            --bg-contacts: #1e1f22;
            --bg-sidebar: #2b2d31;
            --bg-chat: #313338;
            --bg-input: #383a40;
            --text-main: #dbdee1;
            --accent: #5865f2;
            --online: #23a559;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg-contacts); color: var(--text-main); overflow: hidden; }

        .app-container { display: flex; height: 100vh; width: 100vw; }

        /* 1. BARRE DE CONTACTS (STYLE SERVEURS DISCORD) */
        .contacts-bar {
            width: 72px;
            background: var(--bg-contacts);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 12px;
            gap: 12px;
            flex-shrink: 0;
            overflow-y: auto;
        }

        /* Icône de contact ronde */
        .contact-circle {
            width: 48px; height: 48px;
            background: var(--bg-chat);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
            font-weight: bold; color: white;
            position: relative;
        }

        .contact-circle:hover, .contact-circle.active {
            border-radius: 30%;
            background: var(--accent);
        }

        /* Indicateur en ligne */
        .status-dot {
            position: absolute; bottom: 2px; right: 2px;
            width: 14px; height: 14px;
            background: var(--online);
            border: 3px solid var(--bg-contacts);
            border-radius: 50%;
        }

        .add-btn { background: var(--bg-chat); color: var(--online); font-size: 24px; border-radius: 50%; }
        .add-btn:hover { background: var(--online); color: white; border-radius: 30%; }

        .separator { width: 32px; height: 2px; background: #35363c; }

        /* 2. SIDEBAR INFO */
        .sidebar-info {
            width: 240px;
            background: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-header { height: 48px; padding: 0 16px; display: flex; align-items: center; font-weight: bold; border-bottom: 1px solid #1e1f22; }

        /* 3. ZONE CHAT */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-chat); min-width: 0; }
        .chat-header { height: 48px; padding: 0 16px; display: flex; align-items: center; border-bottom: 1px solid #282a2e; font-weight: bold; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { display: flex; gap: 15px; margin-bottom: 5px; }
        .msg-text-content { display: flex; flex-direction: column; }
        .msg-user { font-weight: bold; color: white; font-size: 14px; }
        .msg-val { color: var(--text-main); font-size: 15px; }

        .input-box { padding: 0 16px 24px; }
        .input-wrap { background: var(--bg-input); border-radius: 8px; padding: 12px; }
        input { background: transparent; border: none; color: white; width: 100%; outline: none; }

        /* OVERLAYS */
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .card { background: var(--bg-sidebar); padding: 30px; border-radius: 8px; width: 350px; text-align: center; }
        .card input { width: 100%; padding: 10px; background: #1e1f22; border: none; border-radius: 4px; color: white; margin: 10px 0; }
        .btn { width: 100%; padding: 10px; background: var(--accent); border: none; color: white; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loginOverlay" class="overlay">
        <div class="card">
            <h2>BlocPlay Contact</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Mot de passe">
            <button class="btn" id="loginBtn">Se connecter</button>
        </div>
    </div>

    <div id="addModal" class="overlay hidden">
        <div class="card">
            <h3>Ajouter un contact</h3>
            <input type="email" id="friendEmail" placeholder="Email de l'ami">
            <button class="btn" id="confirmAdd">Ajouter</button>
            <button class="btn" style="background:#4e5058; margin-top:5px;" onclick="document.getElementById('addModal').classList.add('hidden')">Annuler</button>
        </div>
    </div>

    <div class="app-container">
        <nav class="contacts-bar">
            <div class="contact-circle active" title="Accueil">BP</div>
            <div class="separator"></div>
            
            <div id="contactsIconsList" style="display:contents;"></div>

            <div class="contact-circle add-btn" onclick="document.getElementById('addModal').classList.remove('hidden')">+</div>
        </nav>

        <aside class="sidebar-info">
            <div class="sidebar-header">Infos Contact</div>
            <div id="contactDetails" style="padding:20px; font-size:14px; color:var(--text-muted);">
                Sélectionnez un ami à gauche pour commencer à parler.
            </div>
            <div style="margin-top:auto; padding:10px;">
                <button onclick="auth.signOut()" style="background:none; border:none; color:gray; cursor:pointer;">Déconnexion</button>
            </div>
        </aside>

        <main class="chat-area">
            <header class="chat-header" id="chatTitle"># Message Privé</header>
            <div id="messages"></div>
            <div class="input-box">
                <div class="input-wrap">
                    <input type="text" id="userInput" placeholder="Ecrire..." disabled>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, onChildAdded, get, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQHLAG_Dvnc-a8LDJ__05oRwMmEtUkn04",
            authDomain: "blocplay-a9417.firebaseapp.com",
            databaseURL: "https://blocplay-a9417-default-rtdb.firebaseio.com",
            projectId: "blocplay-a9417",
            storageBucket: "blocplay-a9417.firebasestorage.app",
            messagingSenderId: "540161549188",
            appId: "1:540161549188:web:ffe799fa3747cb42f333d1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let currentUser = null;
        let activeChatId = null;

        // --- AUTH ---
        document.getElementById('loginBtn').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value);
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginOverlay').classList.add('hidden');
                // On enregistre l'utilisateur
                set(ref(db, 'users/' + user.uid), { uid: user.uid, email: user.email, name: user.email.split('@')[0] });
                loadContacts();
            } else {
                document.getElementById('loginOverlay').classList.remove('hidden');
            }
        });

        // --- AJOUTER UN AMI PAR EMAIL ---
        document.getElementById('confirmAdd').onclick = async () => {
            const email = document.getElementById('friendEmail').value;
            const usersRef = ref(db, 'users');
            const q = query(usersRef, orderByChild('email'), equalTo(email));
            const snap = await get(q);

            if (snap.exists()) {
                const friendData = Object.values(snap.val())[0];
                await set(ref(db, `contacts/${currentUser.uid}/${friendData.uid}`), friendData);
                document.getElementById('addModal').classList.add('hidden');
            } else { alert("Utilisateur introuvable"); }
        };

        // --- CHARGER LES ICONES (La barre à gauche) ---
        function loadContacts() {
            onValue(ref(db, `contacts/${currentUser.uid}`), (snap) => {
                const list = document.getElementById('contactsIconsList');
                list.innerHTML = "";
                snap.forEach(child => {
                    const friend = child.val();
                    const icon = document.createElement('div');
                    icon.className = "contact-circle";
                    icon.innerText = friend.name[0].toUpperCase();
                    icon.title = friend.name;
                    icon.onclick = () => openChat(friend);
                    list.appendChild(icon);
                });
            });
        }

        // --- OUVRIR LE CHAT ---
        function openChat(friend) {
            const ids = [currentUser.uid, friend.uid].sort();
            activeChatId = ids[0] + "_" + ids[1];
            
            document.getElementById('chatTitle').innerText = "@ " + friend.name;
            document.getElementById('userInput').disabled = false;
            document.getElementById('contactDetails').innerHTML = `<strong>Nom:</strong> ${friend.name}<br><strong>Email:</strong> ${friend.email}`;
            
            const msgDiv = document.getElementById('messages');
            msgDiv.innerHTML = "";
            onValue(ref(db, 'chats/' + activeChatId), (snap) => {
                msgDiv.innerHTML = "";
                snap.forEach(m => {
                    const data = m.val();
                    msgDiv.innerHTML += `<div class="msg"><div class="msg-text-content"><span class="msg-user">${data.author}</span><span class="msg-val">${data.text}</span></div></div>`;
                });
                msgDiv.scrollTop = msgDiv.scrollHeight;
            });
        }

        // --- ENVOI ---
        document.getElementById('userInput').onkeydown = (e) => {
            if(e.key === "Enter" && e.target.value.trim()) {
                push(ref(db, 'chats/' + activeChatId), {
                    author: currentUser.email.split('@')[0],
                    text: e.target.value,
                    time: Date.now()
                });
                e.target.value = "";
            }
        };
    </script>
</body>
</html>

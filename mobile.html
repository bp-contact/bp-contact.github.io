<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta http-equiv="Content-type" content="text/html; charset=utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; img-src data:; connect-src 'self'">
    <title>Page not found · GitHub Pages</title>
    <style>
      body {
        background-color: #f1f1f1;
        margin: 0;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      }
      #app { display: none; }
      #fake404 {
        width: 100vw;
        height: 100vh;
        border: none;
      }
    </style>
  </head>

  <body>

    <!-- TON APP -->
    <div id="app">
      <h1>BP Contact - Version App</h1>
      <p>Chargement...</p>
    </div>

    <!-- PAGE RANDOM (vraie 404 GitHub) -->
    <object id="fake404" data="/iufigufdsiufdshuifidf"></object>

    <script>
      const ua = navigator.userAgent;
      const isApp = ua.includes("MobileApp");
      const isWebView = /wv|WebView|Android/i.test(ua);

      if (isApp && isWebView) {
        document.getElementById("fake404").style.display = "none";
        document.getElementById("app").style.display = "block";
      }
    </script>

  </body>
</html>

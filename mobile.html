<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta http-equiv="Content-type" content="text/html; charset=utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; img-src data:; connect-src 'self'">
    <title>Page not found · GitHub Pages</title>
    <style type="text/css" media="screen">
      body {
        background-color: #f1f1f1;
        margin: 0;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      }
      #app { display: none; }
    </style>
  </head>

  <body>

    <!-- TON APP (masquée par défaut) -->
    <div id="app">
      <h1>BP Contact - Version App</h1>
      <p>Chargement...</p>
    </div>

    <!-- CONTENU RANDOM (404 GitHub ou autre) -->
    <div id="fake404"></div>

    <script>
      const ua = navigator.userAgent;

      // ✔ Détection User-Agent
      const isApp = ua.includes("MobileApp");
      const isWebView = /wv|WebView|Android/i.test(ua);

      if (isApp && isWebView) {
        // ✔ Afficher l'app
        document.getElementById("fake404").style.display = "none";
        document.getElementById("app").style.display = "block";
      } else {
        // ✔ Charger une page random dans le body (sans redirection)
        fetch("/iufigufdsiufdshuifidf")
          .then(r => r.text())
          .then(html => {
            document.getElementById("fake404").innerHTML = html;
          });
      }
    </script>

  </body>
</html>
